services:
  - type: web
    name: courshub-server
    env: node
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: STORAGE_DIR
        value: /opt/render/project/src/server/storage
    disk:
      name: courshub-storage
      mountPath: /opt/render/project/src/server/storage
      sizeGB: 1
